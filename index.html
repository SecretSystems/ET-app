<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exchange Time</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    margin:0;
    padding:20px;
    color:#000;
}

.container{
    max-width:900px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:12px;
}

h1{
    text-align:center;
    margin-bottom:5px;
}

.small{
    text-align:center;
    font-size:12px;
    margin-bottom:20px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

.full{
    grid-column:1/-1;
}

label{
    display:block;
    font-weight:bold;
    margin-bottom:5px;
}

input,select,textarea{
    width:100%;
    padding:10px;
    border:1px solid #000;
    border-radius:6px;
    box-sizing:border-box;
    font-size:16px;
}

textarea{
    min-height:80px;
}

.buttons{
    display:flex;
    gap:10px;
    margin-top:20px;
    flex-wrap:wrap;
}

button{
    flex:1;
    padding:15px;
    border:none;
    background:#000;
    color:#fff;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
}

.signature-box{
    border:1px solid #000;
    background:#fff;
    height:150px;
    position:relative;
}

canvas{
    width:100%;
    height:150px;
    touch-action:none;
}

.badge{
    display:inline-block;
    padding:5px 10px;
    border-radius:20px;
    color:#fff;
    font-size:12px;
}

.green{background:green;}
.yellow{background:orange;}
.red{background:red;}

.exchange-card{
    border:1px solid #ccc;
    border-radius:10px;
    padding:15px;
    margin-top:15px;
}

.hidden{
    display:none;
}

@media(max-width:700px){
    .grid{
        grid-template-columns:1fr;
    }
}

@media print{
    button,
    .buttons{
        display:none !important;
    }

    body{
        background:#fff;
        padding:0;
    }

    .container{
        box-shadow:none;
        border:none;
    }
}
</style>
</head>

<body>

<div class="container">

<h1>REQUEST FOR LEAVE</h1>
<div class="small">Col form #669 (2/77)</div>

<div class="grid">

<div>
<label>Date</label>
<input type="date" id="date">
</div>

<div>
<label>Employee Requesting Leave</label>
<input type="text" id="employeeName">
</div>

<div>
<label>Rank</label>
<select id="rank">
<option value="Firefighter" selected>Firefighter</option>
<option value="Engineer">Engineer</option>
<option value="Captain">Captain</option>
<option value="District Chief">District Chief</option>
</select>
</div>

<div>
<label>Type of Leave</label>
<select id="leaveType" onchange="toggleOtherDescription()">
<option value="Authorized Leave" selected>Authorized Leave</option>
<option value="Comp Time Off">Comp Time Off</option>
<option value="Other">Other</option>
</select>
</div>

<div class="full hidden" id="otherDescriptionWrapper">
<label>Other Description</label>
<input type="text" id="otherDescription">
</div>

<div class="full">
<label>Reason(s) for Leave</label>
<input type="text" id="reason" value="Personal">
</div>

<div>
<label>First Workday Absent Hour</label>
<input type="text" id="firstHour">
</div>

<div>
<label>First Workday Absent Date</label>
<input type="date" id="firstDate">
</div>

<div>
<label>Last Workday Absent Hour</label>
<input type="text" id="lastHour">
</div>

<div>
<label>Last Workday Absent Date</label>
<input type="date" id="lastDate">
</div>

<div>
<label>Non-Work Days Included</label>
<input type="number" id="nonWorkDays" value="0">
</div>

<div>
<label>Work Hours Absent</label>
<input type="number" id="workHours" value="24">
</div>

<div>
<label>Replacement Firefighter</label>
<input type="text" id="replacementName">
</div>

<div>
<label>Supervisor</label>
<input type="text" id="supervisor">
</div>

<div class="full">
<label>Replacement Signature</label>
<div class="signature-box">
<canvas id="sig1"></canvas>
</div>
</div>

<div class="full">
<label>Person Taking Leave Signature</label>
<div class="signature-box">
<canvas id="sig2"></canvas>
</div>
</div>

<div>
<label>
<input type="checkbox" id="firstExchange">
First Exchange
</label>
</div>

<div>
<label>
<input type="checkbox" id="exchangePayback">
Exchange Payback
</label>
</div>

</div>

<div class="buttons">
<button onclick="saveExchange()">Save Exchange</button>
<button onclick="printPDF()">Print / Save PDF</button>
<button onclick="shareLink()">Share Link</button>
</div>

<div id="savedExchanges"></div>

</div>

<script>

document.getElementById('date').valueAsDate = new Date();

function toggleOtherDescription(){
    const leaveType=document.getElementById('leaveType').value;
    const wrapper=document.getElementById('otherDescriptionWrapper');

    if(leaveType==='Other'){
        wrapper.classList.remove('hidden');
    }else{
        wrapper.classList.add('hidden');
    }
}

toggleOtherDescription();

function setupSignature(canvasId){

    const canvas=document.getElementById(canvasId);
    const ctx=canvas.getContext('2d');

    let drawing=false;

    function resizeCanvas(){
        canvas.width=canvas.offsetWidth;
        canvas.height=canvas.offsetHeight;
    }

    resizeCanvas();

    window.addEventListener('resize',resizeCanvas);

    function getPos(e){
        const rect=canvas.getBoundingClientRect();

        if(e.touches){
            return{
                x:e.touches[0].clientX-rect.left,
                y:e.touches[0].clientY-rect.top
            };
        }

        return{
            x:e.clientX-rect.left,
            y:e.clientY-rect.top
        };
    }

    function start(e){
        drawing=true;
        const pos=getPos(e);
        ctx.beginPath();
        ctx.moveTo(pos.x,pos.y);
    }

    function move(e){
        if(!drawing)return;

        e.preventDefault();

        const pos=getPos(e);

        ctx.lineWidth=2;
        ctx.lineCap='round';
        ctx.strokeStyle='black';

        ctx.lineTo(pos.x,pos.y);
        ctx.stroke();
    }

    function end(){
        drawing=false;
    }

    canvas.addEventListener('mousedown',start);
    canvas.addEventListener('mousemove',move);
    canvas.addEventListener('mouseup',end);

    canvas.addEventListener('touchstart',start);
    canvas.addEventListener('touchmove',move);
    canvas.addEventListener('touchend',end);

}

setupSignature('sig1');
setupSignature('sig2');

function saveExchange(){

    const exchanges=JSON.parse(localStorage.getItem('exchanges')||'[]');

    const exchange={

        id:Date.now(),

        date:document.getElementById('date').value,

        employeeName:document.getElementById('employeeName').value,

        rank:document.getElementById('rank').value,

        leaveType:document.getElementById('leaveType').value,

        otherDescription:document.getElementById('otherDescription').value,

        reason:document.getElementById('reason').value,

        firstHour:document.getElementById('firstHour').value,

        firstDate:document.getElementById('firstDate').value,

        lastHour:document.getElementById('lastHour').value,

        lastDate:document.getElementById('lastDate').value,

        nonWorkDays:document.getElementById('nonWorkDays').value,

        workHours:document.getElementById('workHours').value,

        replacementName:document.getElementById('replacementName').value,

        supervisor:document.getElementById('supervisor').value,

        firstExchange:document.getElementById('firstExchange').checked,

        exchangePayback:document.getElementById('exchangePayback').checked

    };

    exchanges.push(exchange);

    localStorage.setItem('exchanges',JSON.stringify(exchanges));

    loadExchanges();

    alert('Exchange Saved');

}

function getBadge(days){

    if(days<14){
        return '<span class="badge red">URGENT</span>';
    }

    if(days<30){
        return '<span class="badge yellow">WARNING</span>';
    }

    return '<span class="badge green">SAFE</span>';

}

function loadExchanges(){

    const container=document.getElementById('savedExchanges');

    const exchanges=JSON.parse(localStorage.getItem('exchanges')||'[]');

    container.innerHTML='<h2>Saved Exchanges</h2>';

    exchanges.reverse().forEach(exchange=>{

        const dueDate=new Date(exchange.date);

        dueDate.setMonth(dueDate.getMonth()+6);

        const diff=Math.floor((dueDate-new Date())/(1000*60*60*24));

        container.innerHTML+=`
            <div class="exchange-card">
                <strong>${exchange.employeeName}</strong><br>
                ${exchange.rank}<br>
                ${exchange.leaveType}<br>
                ${exchange.workHours} Hours<br>
                Due: ${dueDate.toLocaleDateString()}<br>
                ${getBadge(diff)}
            </div>
        `;
    });

}

loadExchanges();

function printPDF(){
    window.print();
}

function shareLink(){

    const url=window.location.href;

    if(navigator.share){

        navigator.share({
            title:'Exchange Time',
            text:'Sign this exchange form',
            url:url
        });

    }else{

        navigator.clipboard.writeText(url);

        alert('Link copied');

    }

}

</script>

</body>
</html>
